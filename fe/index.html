function setMode(next){if(busy)return;mode=next;let searching=mode==='search',digitizing=mode==='digitize',submitting=mode==='submit';searchMode.classList.toggle('active',searching);digitizeMode.classList.toggle('active',digitizing);submitMode.classList.toggle('active',submitting);searchMode.setAttribute('aria-pressed',searching);digitizeMode.setAttribute('aria-pressed',digitizing);submitMode.setAttribute('aria-pressed',submitting);chat.classList.toggle('hidden',submitting);document.querySelector('.composer').classList.toggle('hidden',submitting);submitView.classList.toggle('hidden',!submitting);plus.classList.toggle('hidden',!digitizing);let promptText=document.getElementById('prompt');if(promptText)promptText.textContent=searching?'What do you want to search for?':'What do you want to digitize?';message.placeholder=searching?'Search Past Forward...':'Ask Past Forward to digitize...';message.setAttribute('aria-label',searching?'Search Past Forward':'Ask Past Forward to digitize');if(searching){attachments=[];folderPath='';renderChips()}if(!submitting)message.focus();update()}function updateSubmissionFiles(){let files=Array.from(submitFiles.files),total=files.reduce((sum,file)=>sum+file.size,0),tooMany=files.length>25,tooLarge=files.some(file=>file.size>20*1024*1024),totalTooLarge=total>200*1024*1024;fileSummary.textContent=!files.length?'No files selected':`${files.length} file${files.length===1?'':'s'} selected · ${(total/1024/1024).toFixed(1)} MB${tooMany||tooLarge||totalTooLarge?' · exceeds the submission limits':''}`;fileSummary.classList.toggle('error',tooMany||tooLarge||totalTooLarge)}function submissionNumber(){let date=new Date().toISOString().slice(0,10).replaceAll('-',''),bytes=new Uint32Array(1);crypto.getRandomValues(bytes);return `PF-${date}-${bytes[0].toString(36).toUpperCase().padStart(7,'0').slice(-7)}`}function submitContribution(event){event.preventDefault();let files=Array.from(submitFiles.files),total=files.reduce((sum,file)=>sum+file.size,0);if async function submitSearch(){if(busy)return;let query=message.value.trim();if(!query)return;bubble(query,'user');message.value='';showWorking('Searching and reading the archive');setBusy(true);let answerNode=null,resources=[],answerFailed=false,finished=false;function accept(item){if(item.type==='resources'){resources=item.resources||[];return}if(item.type==='answer_delta'){stopWorking();if(!answerNode){answerNode=document.createElement('div');answerNode.className='bubble agent';chat.appendChild(answerNode)}answerNode.textContent+=item.delta||'';return}if(item.type==='answer_error'){answerFailed=true;return}if(item.type==='done'){finished=true;resources=item.resources||resources}}try{let response=await pfFetch('/api/search/stream?q='+encodeURIComponent(query));if(response.status===401){pfShowLogin();throw new Error('Your session has expired. Please sign in again.')}if(!response.ok)throw new Error((await response.text())||'Search failed.');if(!response.body)throw new Error('Streaming is not supported by this browser.');let reader=response.body.getReader(),decoder=new TextDecoder(),buffer='';while(true){let part=await reader.read();buffer+=decoder.decode(part.value||new Uint8Array(),{stream:!part.done});let lines=buffer.split('\n');buffer=lines.pop()||'';for(let line of lines)if(line.trim())accept(JSON.parse(line));if(part.done)break}if(buffer.trim())accept(JSON.parse(buffer));stopWorking();if(!answerNode){if(answerFailed)bubble('I found relevant material, but could not prepare an answer. The supporting resources are below.','agent',false);else if(resources.length)bubble('I found relevant material, but answer generation is not enabled.','agent',false);else bubble('No matching articles were found. Try fewer or different words.','agent',false)}if(resources.length)chat.insertAdjacentHTML('beforeend',`<h2>Resources</h2>`+resources.map(searchResultCard).join(''));if(!finished)throw new Error('The search stream ended unexpectedly.')}catch(error){stopWorking();if(!answerNod function formatElapsed(ms){let seconds=Math.max(0,Math.floor(ms/1000)),minutes=Math.floor(seconds/60);return minutes?`${minutes}m ${String(seconds%60).padStart(2,'0')}s`:`${seconds}s`}function paintProgress(){let el=document.getElementById('working');if(!el)return;if(progressTarget!==null&&progressShown<progressTarget){progressShown=Math.min(progressTarget,progressShown+Math.max(.12,(progressTarget-progressShown)*.16))}let percent=el.querySelector('.work-percent'),fill=el.querySelector('.progress-fill'),track=el.querySelector('.progress-track'),meta=el.querySelector('.work-meta');if(progressTarget===null){percent.textContent='Working';fill.style.width='100%';track.removeAttribute('aria-valuenow');meta.textContent=`Active · ${formatElapsed(Date.now()-progressStarted)}`}else{let shown=Math.min(100,progressShown);percent.textContent=`${shown>=99.95?'100':shown.toFixed(shown<10?1:0)}%`;fill.style.width=`${Math.max(1,shown)}%`;track.setAttribute('aria-valuenow',String(Math.round(shown)));meta.textContent=`Estimated progress · active for ${formatElapsed(Date.now()-progressStarted)}`}}function showWorking(text='Past Forward is working',percent=undefined){let el=document.getElementById('working');if(!el){progressShown=0;progressTarget=null;progressStarted=Date.now();chat.insertAdjacentHTML('beforeend',`<div id=working class="status working"><div class=work-top><span class=dot></span><strong class=work-label role=status aria-live=polite></strong><span class=work-percent>Working</span></div><div class=progress-track role=progressbar aria-label="Estimated digitisation progress" aria-valuemin=0 aria-valuemax=100><span class=progress-fill></span></div><small class=work-meta aria-hidden=true></small></div>`);el=document.getElementById('working');clearInterval(progressTimer);progressTimer=setInterval(paintProgress,250)}if(Number.isFinite(Number(percent))){progressTarget=Math.max(progressTarget??0,Math.min(100,Number(percent)))}el.querySelector('.work-label').textContent=text;paintProgress();scrollTo(0,document.body.scrollHeight)}function stopWorking(){clearInterval(progressTimer);progressTimer=null;document.getElementById('working')?.remove();progressShown=0;progressTarget=null;progressStarted=0}

async function poll(id){try{let response=await pfFetch('/api/agent/jobs/'+id);if(!response.ok)throw new Error(`status request failed (${response.status})`);let j=await response.json(),fresh=(j.events||[]).slice(seenEvents);pollFailures=0;for(let e of fresh){chat.insertAdjacentHTML('beforeend',`<div class="status"><strong>${esc(e.stage)}</strong>${e.detail?' · '+esc(e.detail):''}${Number.isFinite(Number(e.percent))?` · ≈${Math.round(Number(e.percent))}%`:''}</div>`);showWorking(e.detail||e.stage,e.percent)}if(!fresh.length&&j.progress)showWorking(j.progress.detail||j.progress.stage,j.progress.percent);seenEvents=(j.events||[]).length;scrollTo(0,document.body.scrollHeight);if(j.status==='failed'){stopWorking();bubble('The task failed: '+j.error);if(j.resume_folder){localStorage.setItem('pastForwardInterruptedRun',j.resume_folder);let retry=document.createElement('button');retry.className='retry';retry.textContent='Resume from saved checkpoint';retry.onclick=()=>resumeRun(j.resume_folder);chat.appendChild(retry)}activeJobId='';setBusy(false);return}if(j.status!=='complete'){setTimeout(()=>poll(id),650);return}showWorking('Complete',100);stopWorking();localStorage.removeItem('pastForwardInterruptedRun');for(let r of j.results){let uncertainty=(r.uncertain_regions||[]).length,summary=r.layout_only?`<strong>Layout complete</strong> · ${Number(r.region_count||0)} regions · independently inspected`:r.partial?`<strong>Partial result saved</strong> · ${Number(r.article_count||0)} articles · ${esc(r.status||'paused')}`:`<strong>${r.verified?'Verified':`Saved with ${uncertainty} uncertain article${uncertainty===1?'':'s'}`}</strong> · ${Number(r.article_count||0)} articles · confidence ${Math.round((r.confidence||0)*100)}%`,primary=r.overlay_url,preview=primary?`<a href="${esc(pfApiUrl(primary))}" target=_blank rel=noopener title="Open agent layout overlay"><img class=layout-preview src="${esc(pfApiUrl(primary))}" alt="Agent layout overlay over ${esc(r.source_name)}"></a>`:'',omissions=(r.omissions_found||[]).length?`<p><strong>Omissions repaired:</strong> ${esc(r.omissions_found.join('; '))}</p>`:'',transcript=r.text?`<pre>${esc(r.text)}</pre>`:'',runName=r.folder?String(r.folder).split(/[\\/]/).pop():'',actions=[r.markdown_url?`<a href="${esc(pfApiUrl(r.markdown_url))}" download>Download Markdown</a>`:'',r.articles_url?`<a href="${esc(pfApiUrl(r.articles_url))}" target=_blank rel=noopener>View article records</a>`:'',r.overlay_url?`<a href="${esc(pfApiUrl(r.overlay_url))}" target=_blank rel=noopener>Open agent layout overlay</a>`:'',r.layout_url?`<a href="${esc(pfApiUrl(r.layout_url))}" target=_blank rel=noopener>View agent state</a>`:'',r.source_url?`<a href="/overlay-inspection.html" target=_blank rel=noopener>Inspect Source</a>`:''].filter(Boolean).join('');chat.insertAdjacentHTML('beforeend',`<section class=result><h2>${esc(r.source_name)}</h2><p>${summary}</p>${runName?`<p class=status>Run: ${esc(runName)}</p>`:''}${preview}${omissions}${transcript}<div class=actions>${actions}</div></section>`)}bubble(j.answer||'Done.');activeJobId='';setBusy(false)}catch(error){pollFailures++;if(pollFailures<=5){showWorking(`Connection interrupted; retrying status ${pollFailures}/5`);setTimeout(()=>poll(id),Math.min(5000,650*pollFailures));return}stopWorking();bubble('I lost the status connection. The server task may still be running; use Resume last interrupted run if it stops.');activeJobId='';setBusy(false)}}

let libraryLoaded=false;async function loadLibrary(){if(libraryLoaded)return;try{let response=await fetch('/api/library');if(!response.ok)throw new Error('Library unavailable');let groups=await response.json();libraryColumns.innerHTML=groups.length?groups.map(group=>`<section class=library-group><h3>${esc(group.newspaper)}</h3>${group.pages.map(page=>`<a href="${esc(page.inspect_url)}" target=_blank rel=noopener title="${esc(page.image_path)}">${esc(page.label)}</a>`).join('')}</section>`).join(''):'<p class=library-empty>No completed digitized pages are available yet.</p>';libraryLoaded=true}catch(error){libraryColumns.innerHTML='<p class=library-empty>I could not load the library.</p>'}}

const SEARCH_STATE_KEY='pastForwardSearchStateV1';let startingNewSearch=false;function persistSearchState(){if(mode!=='search'||busy||startingNewSearch)return;let copy=chat.cloneNode(true);copy.querySelector('#working')?.remove();if(!copy.querySelector('.bubble,.result'))return;try{sessionStorage.setItem(SEARCH_STATE_KEY,JSON.stringify({html:copy.innerHTML,scrollY:window.scrollY}))}catch{}}function restoreSearchState(){try{let saved=JSON.parse(sessionStorage.getItem(SEARCH_STATE_KEY)||'null');if(!saved?.html)return false;chat.innerHTML=saved.html;document.body.classList.remove('search-landing');requestAnimationFrame(()=>scrollTo(0,Number(saved.scrollY)||0));return true}catch{sessionStorage.removeItem(SEARCH_STATE_KEY);return false}}function showFreshSearch(){chat.innerHTML='<div id=hero><h2 class=prompt><a class=home-link href="/" aria-label="Past Forward home">Past Forward</a></h2><p id=prompt class=hero-subtitle>What do you want to search for?</p></div>';chat.querySelector('.home-link')?.addEventListener('click',startNewSearch);document.body.classList.add('search-landing')}function showFreshDigitize(){chat.innerHTML='<div id=hero><h2 class=prompt>What do you want to digitize?</h2><p id=prompt class=hero-subtitle>Digitize. Make the past accessible going forward.</p></div>';document.body.classList.add('search-landing')}function startNewSearch(event){event?.preventDefault();startingNewSearch=true;sessionStorage.removeItem(SEARCH_STATE_KEY);location.href='/'}const streamedSearch=submitSearch;submitSearch=async function(){await streamedSearch();persistSearchState()};const routedSetMode=setMode;setMode=function(next){if(next==='digitize')persistSearchState();routedSetMode(next);if(next==='digitize'&&mode==='digitize')showFreshDigitize();if(next==='search'&&mode==='search'&&!restoreSearchState())showFreshSearch()};document.querySelectorAll('.app .home-link').forEach(link=>link.addEventListener('click',startNewSearch));window.addEventListener('pagehide',persistSearchState);restoreSearchState();
