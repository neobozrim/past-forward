<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Overlay Inspection · Past Forward</title><style>
:root{--cream:#ffeed6;--paper:#fffaf2;--brown:#827148;--peach:#e8a07c;--ink:#352f22;--tool:Consolas,"Lucida Console",monospace}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font:14px var(--tool)}header{padding:12px 22px;border-bottom:2px solid var(--brown);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}.brand{margin:0;font:25px Impact,"Arial Black",sans-serif;letter-spacing:1px;text-transform:uppercase;color:var(--brown)}.hero{grid-column:2;text-align:center;padding:5px 20px}.hero h1{margin:0;font:29px Impact,"Arial Black",sans-serif;letter-spacing:1px;text-transform:uppercase;color:var(--brown)}.hero p{margin:5px auto 0;color:#695d41;max-width:680px}.toolbar{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;padding:10px 16px 12px}select,.panel-button,.zoom-controls button{font:inherit;border:1px solid var(--brown);background:var(--paper);padding:8px 10px;border-radius:5px}.panel-button,.zoom-controls button{cursor:pointer}.overlay-control{display:grid;grid-template-columns:auto auto auto;gap:5px;align-items:center;border:0;padding:0;margin:0}.overlay-control legend{grid-column:1/-1;width:100%;padding:0;text-align:center;color:#695d41;font-size:9px;line-height:1;text-transform:uppercase;letter-spacing:.08em}.overlay-control label{font-size:10px;cursor:pointer}.overlay-control input{position:absolute;opacity:0;pointer-events:none}.switch-track{position:relative;width:34px;height:18px;border:1px solid var(--brown);border-radius:20px;background:var(--paper);cursor:pointer}.switch-track:after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--brown);transition:transform .16s}.overlay-control input:not(:checked)+.switch-track:after{transform:translateX(16px);background:var(--peach)}.overlay-control:focus-within .switch-track{outline:2px solid var(--peach);outline-offset:2px}.workspace{padding:0 14px 14px}.statusline{margin:0 0 8px;color:#695d41;font-size:12px}.inspect-hint{text-align:center;margin:0 0 10px;color:var(--brown);font-weight:700}.inspection{display:grid;grid-template-columns:minmax(0,1fr);gap:14px;align-items:start;transition:grid-template-columns .2s}.inspection.inspection-active{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}.text-panel{display:none;position:sticky;top:14px;background:var(--paper);border:1px solid #82714866;border-radius:7px;padding:20px;min-height:440px;max-height:calc(100vh - 160px);overflow:auto}.inspection-active .text-panel{display:block}.panel-actions{display:flex;justify-content:space-between;gap:8px;margin-bottom:18px}.close-text{border:0;background:transparent;font:24px/1 var(--tool);cursor:pointer;color:var(--brown);padding:3px 7px}.text-panel h2{font:22px Georgia,serif;margin:0 0 8px}.text-panel pre{white-space:pre-wrap;font:17px/1.55 Georgia,serif;margin:20px 0}.eyebrow{color:var(--brown);text-transform:uppercase;font-size:11px}.confidence{color:#695d41}.stage{position:relative;width:min(100%,1050px);margin:auto;background:#d8d1c6;box-shadow:0 7px 24px #352f2233;overflow:hidden}.inspection-active .stage{width:100%;max-height:calc(100vh - 165px);overflow:auto}.canvas{position:relative;width:100%;min-width:100%}.source{display:block;width:100%;height:auto}.layer{position:absolute;inset:0}.zoom-controls{display:none;position:sticky;z-index:8;top:8px;float:right;margin:8px;height:0;gap:5px;align-items:center}.inspection-active .zoom-controls{display:flex}.zoom-controls output{background:var(--paper);border:1px solid var(--brown);padding:7px 8px;border-radius:5px;font-size:11px}.region{position:absolute;padding:1px 2px;background:rgba(255,250,242,.86);color:#15110c;border:1px solid rgba(232,160,124,.65);font-family:Georgia,"Times New Roman",serif;line-height:1.04;overflow:hidden;transform-origin:center;clip-path:polygon(var(--polygon));cursor:pointer}.region:hover,.region.selected{z-index:3;background:rgba(255,250,242,.98);border-color:#b74f35;outline:2px solid white}.region.revealed{opacity:0;pointer-events:none}.overlay-off .region{opacity:0;pointer-events:none}.loading,.error{padding:70px 20px;text-align:center}.error{color:#8b1e1e}@media(max-width:520px){header{display:block}.brand{text-align:center}.inspection.inspection-active{grid-template-columns:1fr}.text-panel{position:static;min-height:260px;max-height:none}.inspection-active .stage{grid-row:1}}
</style><header><div class=brand>Past Forward</div><div class=hero><h1>Overlay Inspection</h1><p>Compare the digitized text with its exact source region.</p></div></header><nav class=toolbar aria-label="Inspection controls"><select id=pageSelect aria-label="Inspection page"></select><fieldset class=overlay-control><legend>Overlay</legend><label for=overlaySwitch>On</label><input id=overlaySwitch type=checkbox role=switch checked aria-label="Show overlay"><label class=switch-track for=overlaySwitch aria-hidden=true></label><label for=overlaySwitch>Off</label></fieldset></nav><main class=workspace><p id=statusline class=statusline></p><p id=inspectHint class=inspect-hint>Click to inspect an article block</p><div id=inspection class=inspection><aside id=textPanel class=text-panel></aside><div id=stage class=stage><div class=zoom-controls><button type=button onclick=changeZoom(-.25) aria-label="Zoom out">−</button><output id=zoomValue>100%</output><button type=button onclick=changeZoom(.25) aria-label="Zoom in">+</button></div><div id=canvas class=canvas><p class=loading>Loading agent overlay…</p></div></div></div></main><script src=/config.js></script><script>
const PF_API_URL=window.PF_CONFIG.apiUrl;
const pfApiUrl=value=>value&&String(value).startsWith('/')?PF_API_URL+value:value;
const pfNativeFetch=window.fetch.bind(window);
window.fetch=(input,options)=>pfNativeFetch(typeof input==='string'&&input.startsWith('/')?pfApiUrl(input):input,options);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let current=null,overlayOn=true,zoom=1;
function blockStyle(block){let xs=block.polygon.map(p=>p[0]/10),ys=block.polygon.map(p=>p[1]/10),x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y,poly=block.polygon.map(p=>`${(p[0]/10-x)/w*100}% ${(p[1]/10-y)/h*100}%`).join(','),families={serif:'Georgia,Times New Roman,serif',sans:'Arial,sans-serif',condensed:'Arial Narrow,Roboto Condensed,Arial,sans-serif',display:'Impact,Arial Narrow,sans-serif'},family=families[block.font_family||'serif'];return `left:${x}%;top:${y}%;width:${w}%;height:${h}%;--polygon:${poly};--font-width:${block.font_width_scale||1};font-family:${family};font-weight:${block.font_weight||400};letter-spacing:${block.letter_spacing_em||0}em`}
function fitText(){let fallbackMinimum=Math.max(4,canvas.clientWidth/250);document.querySelectorAll('.region').forEach(el=>{let block=current?.blocks?.[+el.dataset.index],size=block?.font_size_ratio?canvas.clientWidth*block.font_size_ratio:Math.max(18,fallbackMinimum),minimum=block&&block.font_size_ratio?0.5:fallbackMinimum;el.style.lineHeight=String(block?.line_height||1.04);el.style.fontSize=Math.max(minimum,size)+'px';let text=el.firstElementChild,box=el.getBoundingClientRect(),textBox=text.getBoundingClientRect(),range=document.createRange();range.selectNodeContents(text);let rects=[...range.getClientRects()],bottom=rects.length?Math.max(...rects.map(r=>r.bottom)):textBox.top,overflow=bottom>box.bottom+1||textBox.right>box.right+1;el.classList.toggle('placement-failed',overflow);el.title=overflow?'Agent placement failed: text does not fit its authored region':''})}function changeZoom(delta){zoom=Math.max(.5,Math.min(3,zoom+delta));canvas.style.width=(zoom*100)+'%';zoomValue.value=Math.round(zoom*100)+'%';fitText()}
function panelActions(){return '<div class=panel-actions><button class=panel-button onclick=exitInspection()>Back to full page</button><button class=close-text aria-label="Clear inspected text" onclick=clearInspection()>×</button></div>'}function inspectBlock(index){let block=current.blocks[index];inspection.classList.add('inspection-active');inspectHint.hidden=true;document.querySelectorAll('.region').forEach((el,i)=>{el.classList.toggle('selected',i===index);el.classList.toggle('revealed',i===index)});textPanel.innerHTML=`${panelActions()}<div class=eyebrow>${esc(block.block_id)}</div><h2>${esc(block.article_label)}</h2><div class=confidence>${esc(block.role)} · confidence ${Math.round(block.confidence*100)}%</div><pre>${esc(block.text)}</pre>`;fitText()}
function restoreRegions(){document.querySelectorAll('.region').forEach(el=>el.classList.remove('selected','revealed'))}function clearInspection(){restoreRegions();textPanel.innerHTML=`${panelActions()}<p>Click another article block to visualise its digitized text here.</p>`;fitText()}function exitInspection(){restoreRegions();inspection.classList.remove('inspection-active');inspectHint.hidden=false;textPanel.innerHTML='';zoom=1;canvas.style.width='100%';zoomValue.value='100%';fitText()}
async function loadPage(id,sourceId=null){exitInspection();canvas.innerHTML='<p class=loading>Loading agent overlay…</p>';let started=Date.now(),url=sourceId?'/api/overlay/source?source_id='+encodeURIComponent(sourceId):'/api/overlay/demo?demo_id='+encodeURIComponent(id),response=await fetch(url);if(!response.ok)throw new Error('Agent overlay unavailable');current=await response.json();let preload=new Image();preload.src=pfApiUrl(current.image_url);await Promise.all([preload.decode?preload.decode():new Promise((resolve,reject)=>{preload.onload=resolve;preload.onerror=reject}),new Promise(resolve=>setTimeout(resolve,Math.max(0,3000-(Date.now()-started))))]);statusline.textContent=`${current.source_name} · ${current.blocks.length} placed regions · ${current.article_count} articles · ${current.coverage_complete?'complete coverage':current.coverage_note||'placement review pending'}`;stage.classList.toggle('overlay-off',!overlayOn);canvas.innerHTML=`<img class=source src="${esc(pfApiUrl(current.image_url))}" alt="Digitized newspaper source"><div class=layer>${current.blocks.map((block,i)=>`<article class="region" data-index="${i}" style="${blockStyle(block)}"><span class=region-text>${esc(block.overlay_text||block.text).replace(/\n/g,'<br>')}</span></article>`).join('')}</div>`;canvas.querySelectorAll('.region').forEach(el=>el.onclick=()=>inspectBlock(+el.dataset.index));requestAnimationFrame(()=>requestAnimationFrame(fitText))}
overlaySwitch.onchange=()=>{overlayOn=overlaySwitch.checked;stage.classList.toggle('overlay-off',!overlayOn)};pageSelect.onchange=()=>loadPage(pageSelect.value).catch(showError);function showError(error){canvas.innerHTML=`<p class=error>${esc(error.message)}</p>`}
let requested=new URLSearchParams(location.search),requestedDemo=requested.get('demo'),requestedSource=requested.get('source');fetch('/api/overlay/demos').then(r=>r.json()).then(items=>{pageSelect.innerHTML=items.map(x=>`<option value="${esc(x.id)}">${esc(x.label)}</option>`).join('');let selected=items.some(x=>x.id===requestedDemo)?requestedDemo:items[0].id;if(!requestedSource)pageSelect.value=selected;else pageSelect.disabled=true;return loadPage(selected,requestedSource)}).catch(showError);
</script></html>
